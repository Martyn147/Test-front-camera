<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lector QR Test</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    padding: 10px;
    margin: 0;
    background: #f5f5f5;
}

/* contenedor general */
.container{
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

/* video responsivo */
#video{
    width: 100%;
    max-width: 100%;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: black;
}

/* resultado */
#resultado{
    margin-top: 15px;
    padding: 15px;
    border: 1px solid #ccc;
    font-size: 18px;
    word-break: break-word;
    min-height: 40px;
    background: white;
    border-radius: 8px;
}

/* botones */
button{
    margin-top: 10px;
    padding: 12px;
    width: 48%;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
}

.btn-start{
    background: #28a745;
    color: white;
}

.btn-stop{
    background: #dc3545;
    color: white;
}

/* layout botones */
.buttons{
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

/* móvil ajustes */
@media (max-width: 600px){

    body{
        padding: 5px;
    }

    #resultado{
        font-size: 16px;
    }

    button{
        width: 100%;
    }

    .buttons{
        flex-direction: column;
    }
}

</style>

</head>

<body>

<div class="container">

<h1>Lector QR</h1>

<video id="video" playsinline></video>

<div class="buttons">

    <button class="btn-start" onclick="iniciar()">Iniciar cámara</button>
    <button class="btn-stop" onclick="detener()">Detener</button>

</div>

<h3>Resultado</h3>

<div id="resultado">Esperando QR...</div>

</div>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<script>

let codeReader = null;
let controls = null;

async function iniciar(){

    const video = document.getElementById("video");
    const resultado = document.getElementById("resultado");

    resultado.innerText = "Iniciando cámara...";

    try{

        codeReader = new ZXingBrowser.BrowserMultiFormatReader();

        controls = await codeReader.decodeFromVideoDevice(
            null,
            video,
            (result, err) => {

                if(result){
                    resultado.innerText = result.getText();
                }

            }
        );

    }catch(e){

        console.error(e);
        resultado.innerText = "Error al iniciar cámara";

    }

}

function detener(){

    const resultado = document.getElementById("resultado");

    if(controls){
        controls.stop();
        controls = null;
    }

    if(codeReader){
        codeReader = null;
    }

    resultado.innerText = "Detenido";

}

</script>

</body>
</html>
