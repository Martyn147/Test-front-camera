<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Lector QR</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    padding:20px;
}

#reader{
    width:500px;
    margin:auto;
}

#resultado{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    font-size:20px;
    word-break: break-word;
}

</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h1>Lector QR</h1>

<div id="reader"></div>

<h3>Contenido:</h3>

<div id="resultado">
Esperando QR...
</div>

<script>

function exito(textoDecodificado){

    document.getElementById("resultado").innerText = textoDecodificado;

}

function error(error){

    // opcional ignorar errores mientras busca
}

const scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps:10,
        qrbox:{
            width:250,
            height:250
        }
    },
    false
);

scanner.render(exito,error);

</script>

</body>

</html>
